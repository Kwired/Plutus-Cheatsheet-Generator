<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Setup Guide | Plutus Cheatsheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link href="https://fonts.cdnfonts.com/css/supernova-2" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .font-title { font-family: 'Supernova', 'Inter', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prose h1 { color: white; font-weight: 800; font-size: 2.5rem; margin-bottom: 2rem; }
        .prose h2 { color: white; font-weight: 700; font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .prose h3 { color: #38bdf8; font-weight: 600; font-size: 1.25rem; margin-top: 1.5rem; }
        .prose p { color: #94a3b8; line-height: 1.75; margin-bottom: 1rem; }
        .prose ul { color: #94a3b8; list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.5rem; }
        .prose code { background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; rounded: 0.25rem; color: #e2e8f0; font-family: monospace; }
        .prose pre { background: #0f172a; padding: 1rem; border-radius: 0.5rem; border: 1px solid rgba(255,255,255,0.1); overflow-x: auto; margin-bottom: 1rem; }
        .prose pre code { background: transparent; padding: 0; color: #f8fafc; }
        .prose hr { border-color: rgba(255,255,255,0.1); margin: 2rem 0; }
        .prose a { color: #38bdf8; text-decoration: none; }
        .prose a:hover { text-decoration: underline; }
    </style>
    <!-- Google tag (gtag.js) -->
    <script async src="https://www.googletagmanager.com/gtag/js?id=G-T6PLH73ELD"></script>
    <script>
        window.dataLayer = window.dataLayer || [];
        function gtag() { dataLayer.push(arguments); }
        gtag('js', new Date());

        gtag('config', 'G-T6PLH73ELD');
    </script>
</head>
<body class="bg-slate-950 text-slate-200 font-sans flex flex-col min-h-screen">
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="./index.html" class="flex items-center gap-2">
                <div class="p-1.5 bg-brand-500 rounded-lg">
                    <i data-lucide="code-2" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold text-white">Plutus Cheatsheet</span>
            </a>
            <a href="./index.html" class="text-sm font-medium hover:text-sky-400 transition-colors flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
            </a>
        </div>
    </nav>

    <main class="flex-grow pt-32 pb-20 px-4 max-w-4xl mx-auto">
        <div id="content" class="prose prose-invert max-w-none">
             <div class="animate-pulse flex flex-col gap-4">
                <div class="h-10 bg-slate-800 rounded w-1/2"></div>
                <div class="h-4 bg-slate-800 rounded w-full"></div>
                <div class="h-4 bg-slate-800 rounded w-full"></div>
                <div class="h-4 bg-slate-800 rounded w-3/4"></div>
             </div>
        </div>
    </main>

    <!-- Footer -->
    <footer class="py-12 border-t border-white/5 bg-slate-950">
        <div class="max-w-7xl mx-auto px-4 sm:px-6 lg:px-8">
            <div class="flex flex-col md:flex-row justify-between items-center gap-8">
                <div class="flex items-center gap-2">
                    <div class="p-1 bg-brand-500 rounded">
                        <i data-lucide="code-2" class="w-4 h-4 text-white"></i>
                    </div>
                    <span class="text-lg font-bold text-white font-title">Plutus Cheatsheet</span>
                </div>
                <div class="flex gap-8 text-sm text-slate-400">
                    <a href="./user-guide.html" class="hover:text-white transition-colors">User Guide</a>
                    <a href="./setup-guide.html" class="hover:text-white transition-colors">Setup Guide</a>
                    <a href="https://github.com/kwired/Plutus-Cheatsheet-Generator"
                        class="hover:text-white transition-colors">GitHub</a>
                </div>
                <p class="text-xs text-slate-400 font-medium">
                    Made with ❤️ in India — Fund 14 Cardano
                </p>
            </div>
        </div>
    </footer>

    <script>
        fetch('./running-plutus-snippets.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
                lucide.createIcons();
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p class="text-red-400">Error loading guide. Please check if running-plutus-snippets.md exists.</p>';
            });
        
        lucide.createIcons();
    </script>
</body>
</html>

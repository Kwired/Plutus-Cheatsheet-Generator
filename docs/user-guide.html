<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>User Guide | Plutus Cheatsheet</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        .glass {
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
        }
        .prose h1 { color: white; font-weight: 800; font-size: 2.5rem; margin-bottom: 2rem; }
        .prose h2 { color: white; font-weight: 700; font-size: 1.5rem; margin-top: 2rem; margin-bottom: 1rem; border-bottom: 1px solid rgba(255,255,255,0.1); padding-bottom: 0.5rem; }
        .prose h3 { color: #38bdf8; font-weight: 600; font-size: 1.25rem; margin-top: 1.5rem; }
        .prose p { color: #94a3b8; line-height: 1.75; margin-bottom: 1rem; }
        .prose ul { color: #94a3b8; list-style-type: disc; margin-left: 1.5rem; margin-bottom: 1rem; }
        .prose li { margin-bottom: 0.5rem; }
        .prose code { background: rgba(255,255,255,0.1); padding: 0.2rem 0.4rem; rounded: 0.25rem; color: #e2e8f0; }
        .prose hr { border-color: rgba(255,255,255,0.1); margin: 2rem 0; }
        .prose a { color: #38bdf8; text-decoration: none; }
        .prose a:hover { text-decoration: underline; }
    </style>
</head>
<body class="bg-slate-950 text-slate-200">
    <nav class="fixed top-0 w-full z-50 glass border-b border-white/5">
        <div class="max-w-4xl mx-auto px-4 h-16 flex items-center justify-between">
            <a href="./index.html" class="flex items-center gap-2">
                <div class="p-1.5 bg-brand-500 rounded-lg">
                    <i data-lucide="code-2" class="w-5 h-5 text-white"></i>
                </div>
                <span class="text-xl font-bold text-white">Plutus Cheatsheet</span>
            </a>
            <a href="./index.html" class="text-sm font-medium hover:text-sky-400 transition-colors flex items-center gap-1">
                <i data-lucide="arrow-left" class="w-4 h-4"></i> Back
            </a>
        </div>
    </nav>

    <main class="pt-32 pb-20 px-4 max-w-4xl mx-auto">
        <div id="content" class="prose prose-invert max-w-none">
            <!-- Content will be rendered here -->
             <div class="animate-pulse flex flex-col gap-4">
                <div class="h-10 bg-slate-800 rounded w-1/2"></div>
                <div class="h-4 bg-slate-800 rounded w-full"></div>
                <div class="h-4 bg-slate-800 rounded w-full"></div>
                <div class="h-4 bg-slate-800 rounded w-3/4"></div>
             </div>
        </div>
    </main>

    <script>
        fetch('./USER_GUIDE.md')
            .then(response => response.text())
            .then(text => {
                document.getElementById('content').innerHTML = marked.parse(text);
                lucide.createIcons();
            })
            .catch(err => {
                document.getElementById('content').innerHTML = '<p class="text-red-400">Error loading guide. Please check if USER_GUIDE.md exists.</p>';
            });
        
        lucide.createIcons();
    </script>
</body>
</html>

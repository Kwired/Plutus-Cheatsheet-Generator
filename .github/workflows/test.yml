name: Tests

on:
  push:
    branches: [main, release/v1.0.0]
  pull_request:
    branches: [main, release/v1.0.0]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - run: npm test
